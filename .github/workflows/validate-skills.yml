name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'docs/**'
      - 'scripts/validate-skills.py'
      - 'scripts/sync-docs.py'
  pull_request:
    paths:
      - 'skills/**'
      - 'docs/**'
      - 'scripts/validate-skills.py'
      - 'scripts/sync-docs.py'

jobs:
  validate:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Validate all skills
        run: uv run scripts/validate-skills.py

  docs-sync:
    name: Check docs are in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Check docs list all skills
        run: uv run scripts/sync-docs.py

  installability:
    name: Verify skills CLI compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: List discoverable skills
        run: npx -y skills add . --list
